<!DOCTYPE html><html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Undangan Digital | Widya & Miftah</title><link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;900&display=swap" rel="stylesheet"><style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
    background: radial-gradient(circle at center, #ad1457, #880e4f);
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:'Montserrat', sans-serif;
    animation: cameraMove 10s ease-in-out infinite alternate;
}

/* CAMERA */
@keyframes cameraMove {
    from { transform: scale(1); }
    to { transform: scale(1.05); }
}

/* COVER */
#cover {
    position:fixed;
    inset:0;
    background:#880e4f;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:100;
    color:white;
    cursor:pointer;
    transition:0.8s;
}

/* GLOW */
body::after {
    content:"";
    position:absolute;
    inset:0;
    background: radial-gradient(circle, rgba(255,255,255,0.25), transparent 70%);
    animation: glow 5s infinite alternate;
}

@keyframes glow {
    from { opacity:0.3; }
    to { opacity:0.7; }
}

/* PETALS */
.petals-container { position:absolute; inset:0; z-index:5; pointer-events:none; }
.petal {
    position:absolute;
    border-radius:150% 0 150% 150%;
    opacity:0.7;
    animation: fall linear infinite;
}
.petal:nth-child(even){ background:#ffc0cb; }
.petal:nth-child(odd){ background:#fff; }

@keyframes fall {
    0% { transform:translateY(-10vh) rotate(0); opacity:0; }
    10% { opacity:0.8; }
    100% { transform:translateY(110vh) rotate(360deg) translateX(50px); opacity:0; }
}

/* TEXT */
.text-overlay {
    position:absolute;
    z-index:20;
    text-align:center;
    color:white;
    opacity:0;
}

.name {
    font-family:'Great Vibes';
    font-size:4.5rem;
    text-shadow:2px 2px 0 rgba(0,0,0,0.3),4px 4px 0 #880e4f,0 0 10px rgba(255,255,255,0.5);
}

.ampersand { font-size:3rem; font-weight:900; }
.parents { font-size:0.7rem; letter-spacing:5px; }

/* PHOTO */
.photo-space {
    position:absolute;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:10;
}

.photo {
    width:160px;
    height:160px;
    background-size:cover;
    background-position:center;
    position:absolute;
    opacity:0;
    filter: drop-shadow(0 20px 15px rgba(0,0,0,0.4));
}

.widya-photo { background-image:url('widya.png'); }
.miftah-photo { background-image:url('gambar.png'); }

/* FLOAT */
@keyframes float {
    0%,100% { transform:translateY(0); }
    50% { transform:translateY(-10px); }
}

.float {
    animation: float 4s ease-in-out infinite;
}
</style></head><body><div id="cover" onclick="start()">
    <h1>Klik untuk Buka Undangan</h1>
</div><audio id="music" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio><div class="petals-container"></div><div class="text-overlay" id="text">
    <h2 class="name">Widya</h2>
    <p class="parents">Bpk. Warto & Ibu Warti</p>
    <div class="ampersand">&</div>
    <h2 class="name">Miftah</h2>
    <p class="parents">Bpk. Kadiya & Ibu Khodijah</p>
</div><div class="photo-space">
    <div class="photo widya-photo" id="widya"></div>
    <div class="photo miftah-photo" id="miftah"></div>
</div><script>
// PETALS GENERATE
for(let i=0;i<15;i++){
    let p=document.createElement('div');
    p.className='petal';
    p.style.width=(Math.random()*10+10)+'px';
    p.style.height=p.style.width;
    p.style.left=Math.random()*100+'%';
    p.style.animationDuration=(Math.random()*5+8)+'s';
    document.querySelector('.petals-container').appendChild(p);
}

// START FLOW
function start(){
    document.getElementById("cover").style.opacity=0;
    setTimeout(()=>document.getElementById("cover").style.display="none",800);

    document.getElementById("music").play();

    // FOTO MASUK DULU
    setTimeout(()=>{
        let w=document.getElementById("widya");
        let m=document.getElementById("miftah");

        w.style.opacity=1;
        m.style.opacity=1;

        w.style.transform="translateX(-80px)";
        m.style.transform="translateX(80px)";

        w.classList.add("float");
        m.classList.add("float");
    },500);

    // TEKS MUNCUL BELAKANGAN
    setTimeout(()=>{
        document.getElementById("text").style.opacity=1;
    },2500);
}
</script></body>
</html>
