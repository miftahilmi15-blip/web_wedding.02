<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background: #ad1457; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Montserrat', sans-serif; }

        .container { position: relative; width: 300px; height: 400px; display: flex; flex-direction: column; align-items: center; justify-content: center; }

        /* Teks 3D Embossed */
        .name { 
            font-family: 'Great Vibes', cursive; font-size: 3.5rem; color: #fff;
            text-shadow: 2px 2px 0 #880e4f, 4px 4px 0 rgba(0,0,0,0.3);
            margin: 10px 0;
        }

        .parents { color: #ffebee; font-size: 0.6rem; letter-spacing: 2px; text-transform: uppercase; }

        /* GAMBAR TANPA KOTAK */
        .photo {
            width: 150px; /* Atur ukuran gambar di sini */
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.3));
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="widya_transparan.png" class="photo">
        
        <h2 class="name">Widya</h2>
        <p class="parents">Bpk. Warto & Ibu Warti</p>
        
        <div style="color:white; margin:10px 0;">&</div>
        
        <h2 class="name">Miftah</h2>
        <p class="parents">Bpk. Kadiya & Ibu Khodijah</p>
        
        <img src="miftah_transparan.png" class="photo">
    </div>
</body>
</html>
