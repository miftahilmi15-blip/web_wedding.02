<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Undangan Digital | Widya & Miftah</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;900&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; outline: none; }
        body { 
            background: radial-gradient(circle at center, #ad1457, #880e4f);
            overflow: hidden; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; width: 100vw;
            font-family: 'Montserrat', sans-serif; 
        }

        /* --- EFEK BUNGA WARNA-WARNI --- */
        .petals-container { position: absolute; inset: 0; z-index: 5; pointer-events: none; }
        .petal {
            position: absolute;
            border-radius: 150% 0 150% 150%;
            opacity: 0.7;
            animation: fall linear infinite;
        }
        /* Variasi Warna & Animasi */
        .petal:nth-child(even) { background-color: #ffc0cb; } /* Pink */
        .petal:nth-child(odd) { background-color: #ffffff; } /* Putih */

        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg) translateX(0px); opacity: 0; }
            10% { opacity: 0.8; }
            100% { transform: translateY(110vh) rotate(360deg) translateX(50px); opacity: 0; }
        }

        /* --- TEKS 3D LEBIH TAJAM --- */
        .text-overlay {
            position: absolute; z-index: 20;
            display: flex; flex-direction: column; align-items: center;
            color: white; pointer-events: none; text-align: center;
        }

        .name { 
            font-family: 'Great Vibes', cursive; font-size: 4.8rem;
            /* Tajam: kombinasi bayangan hitam untuk kedalaman dan putih untuk highlight */
            text-shadow: 
                2px 2px 0px rgba(0,0,0,0.3), 
                4px 4px 0px #880e4f, 
                0px 0px 10px rgba(255,255,255,0.5);
            -webkit-text-stroke: 1px #fff;
            letter-spacing: 2px;
            margin: 10px 0;
        }

        .ampersand { font-size: 3rem; font-weight: 900; margin: 10px 0; }
        .parents { font-size: 0.7rem; letter-spacing: 6px; font-weight: 900; text-transform: uppercase; }

        /* --- FOTO --- */
        .photo-space { position: absolute; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; z-index: 10; }
        .photo {
            width: 160px; height: 160px;
            background-size: cover; background-position: center top;
            filter: drop-shadow(0 20px 15px rgba(0,0,0,0.4));
            opacity: 0; position: absolute;
        }

        .widya-photo { background-image: url('widya.png'); animation: moveWidya 8s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
        .miftah-photo { background-image: url('gambar.png'); animation: moveMiftah 8s cubic-bezier(0.22, 1, 0.36, 1) forwards; }

        @keyframes moveWidya { 100% { transform: translateX(-80px); opacity: 1; } }
        @keyframes moveMiftah { 100% { transform: translateX(80px); opacity: 1; } }
    </style>
</head>
<body>
    <div class="petals-container">
        <script>
            // Membuat 15 kelopak secara otomatis
            for(let i=0; i<15; i++) {
                let p = document.createElement('div');
                p.className = 'petal';
                p.style.width = (Math.random()*10+10) + 'px';
                p.style.height = p.style.width;
                p.style.left = Math.random()*100 + '%';
                p.style.animationDuration = (Math.random()*5+8) + 's';
                p.style.animationDelay = Math.random()*5 + 's';
                document.querySelector('.petals-container').appendChild(p);
            }
        </script>
    </div>
    
    <div class="text-overlay">
        <h2 class="name">Widya</h2>
        <p class="parents">Bpk. Warto & Ibu Warti</p>
        <div class="ampersand">&</div>
        <h2 class="name">Miftah</h2>
        <p class="parents">Bpk. Kadiya & Ibu Khodijah</p>
    </div>

    <div class="photo-space">
        <div class="photo widya-photo"></div>
        <div class="photo miftah-photo"></div>
    </div>
</body>
</html>
