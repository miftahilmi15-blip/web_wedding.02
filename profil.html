<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil Mempelai | Widya & Miftah</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background: #fff; font-family: 'Montserrat', sans-serif; color: #333; line-height: 1.6; }

        /* HEADER ELEGAN */
        .header { height: 40vh; background: #ad1457; display: flex; justify-content: center; align-items: center; color: white; }
        .header h1 { font-family: 'Great Vibes', cursive; font-size: 3rem; }

        /* CONTAINER PROFIL */
        .container { max-width: 500px; margin: -40px auto 40px; padding: 40px 20px; background: white; border-radius: 40px 40px 0 0; text-align: center; }

        .mempelai-card { margin-bottom: 60px; }
        .name { font-family: 'Great Vibes', cursive; font-size: 3rem; color: #ad1457; margin-bottom: 10px; }
        .parents { font-size: 0.9rem; color: #666; font-weight: 300; margin-bottom: 20px; }
        .divider { font-size: 2rem; color: #ad1457; margin: 30px 0; }
        
        /* FADE IN ANIMATION */
        .fade-in { opacity: 0; transform: translateY(20px); transition: 1s all ease; }
        .show { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body>

    <div class="header">
        <h1>Mempelai</h1>
    </div>

    <div class="container">
        <div class="mempelai-card fade-in">
            <h2 class="name">Widya</h2>
            <p class="parents">Putri dari <br> <strong>Bapak Warto & Ibu Warti</strong></p>
        </div>

        <div class="divider fade-in">&</div>

        <div class="mempelai-card fade-in">
            <h2 class="name">Miftah</h2>
            <p class="parents">Putra dari <br> <strong>Bapak Kadiya & Ibu Khodijah</strong></p>
        </div>
    </div>

    <script>
        // Animasi muncul pelan saat dibuka
        window.addEventListener('load', () => {
            document.querySelectorAll('.fade-in').forEach((el, index) => {
                setTimeout(() => { el.classList.add('show'); }, index * 500);
            });
        });
    </script>
</body>
</html>
