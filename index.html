<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wedding Invitation | Samira & Murad</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/7.2.4/pixi.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#000; overflow:hidden; font-family:'Montserrat', sans-serif; color:white; }

        /* SCENE CONTAINER */
        #scene-container { position:fixed; inset:0; perspective:1000px; overflow:hidden; }

        /* LAYERS */
        .layer { position:absolute; inset:0; background-size:cover; background-position:center; will-change:transform; }
        
        .layer-bg { 
            background:url('background-pelaminan.png') center/cover no-repeat; 
            transform:translateZ(-200px) scale(1.2); 
            z-index:10; 
        }

        .layer-couple { 
            background:url('mempelai.png') center/contain no-repeat; 
            transform:translateZ(50px) scale(1.1); 
            z-index:20; 
            filter: drop-shadow(0 20px 30px rgba(0,0,0,0.5)); 
        }

        #pixi-canvas { position:absolute; inset:0; z-index:15; }

        .light-sweep { 
            position:absolute; width:200%; height:100%; top:0; left:-100%; 
            background:linear-gradient(120deg, transparent, rgba(255,255,255,0.3), transparent); 
            z-index:25; pointer-events:none; 
        }

        /* UI OVERLAY */
        .ui-overlay { 
            position:fixed; bottom:0; width:100%; height:35%; 
            display:flex; flex-direction:column; justify-content:center; align-items:center; 
            background:linear-gradient(to top, rgba(0,0,0,0.85), transparent); 
            z-index:100; 
        }

        .title { font-family:'Great Vibes', cursive; font-size:3rem; color:#ec407a; margin-bottom:10px; }
        .date-text { font-size:0.9rem; margin-bottom:20px; }
        .btn { 
            padding:15px 40px; border:none; border-radius:50px; 
            background:linear-gradient(45deg,#ad1457,#ec407a); color:white; 
            cursor:pointer; letter-spacing:2px; transition:0.3s;
        }
        .btn:hover { transform:scale(1.05); filter:brightness(1.2); }

        .fade-in { opacity:0; animation:fadeIn 2s forwards; }
        @keyframes fadeIn { to { opacity:1; } }
    </style>
</head>
<body>

    <div id="scene-container">
        <div class="layer layer-bg fade-in" id="bg"></div>
        <canvas id="pixi-canvas"></canvas>
        <div class="layer layer-couple fade-in" id="couple"></div>
        <div class="light-sweep"></div>
    </div>

    <div class="ui-overlay fade-in">
        <h1 class="title">Samira & Murad</h1>
        <p class="date-text">Sabtu, 14 Februari 2026</p>
        <button class="btn" onclick="buka()">BUKA UNDANGAN</button>
    </div>

    <script>
        // 1. PARALLAX ENGINE
        const bg = document.getElementById('bg');
        const couple = document.getElementById('couple');

        function move(x, y) {
            gsap.to(bg, { x: x * 10, y: y * 10, duration: 1, ease: "power2.out" });
            gsap.to(couple, { x: x * 30, y: y * 30, duration: 1, ease: "power2.out" });
        }

        window.addEventListener('mousemove', e => {
            let x = (e.clientX - window.innerWidth / 2) / (window.innerWidth / 2);
            let y = (e.clientY - window.innerHeight / 2) / (window.innerHeight / 2);
            move(x, y);
        });

        // 2. ANIMATIONS
        gsap.to("#couple", { y: 15, duration: 3, repeat: -1, yoyo: true, ease: "power1.inOut" });
        gsap.to("#scene-container", { x: 10, y: 5, duration: 6, repeat: -1, yoyo: true, ease: "sine.inOut" });
        gsap.to(".light-sweep", { x: "100%", duration: 5, repeat: -1, ease: "none" });

        // 3. PIXI PARTICLES
        const app = new PIXI.Application({ view: document.getElementById("pixi-canvas"), width: window.innerWidth, height: window.innerHeight, backgroundAlpha: 0 });
        let particles = [];
        for(let i=0; i<60; i++) {
            let p = new PIXI.Graphics();
            p.beginFill(0xffffff); p.drawCircle(0, 0, Math.random() * 2 + 1); p.endFill();
            p.x = Math.random() * app.screen.width; p.y = Math.random() * app.screen.height;
            p.speed = Math.random() * 0.5 + 0.2;
            app.stage.addChild(p);
            particles.push(p);
        }
        app.ticker.add(() => {
            particles.forEach(p => {
                p.y -= p.speed;
                if(p.y < 0) p.y = app.screen.height;
            });
        });

        // 4. NAVIGATION
        function buka() {
            gsap.to("body", { opacity: 0, duration: 0.8, onComplete: () => { window.location.href = "profil.html"; }});
        }
    </script>
</body>
</html>
