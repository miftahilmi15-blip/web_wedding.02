<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation - Samira & Murad</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">

    <style>
        /* CSS Dasar & Reset */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            /* Background Luar Frame: Ivory Gradient (Sesuai Prompt) */
            background: radial-gradient(circle, #fff 0%, #f5f5f0 100%);
            font-family: 'Montserrat', sans-serif; 
            overflow: hidden; height: 100vh; width: 100vw;
            display: flex; justify-content: center; align-items: center;
            perspective: 1000px; /* Penting untuk efek Parallax */
        }

        /* --- CONTAINER UTAMA (EFEK LAYER 3D) --- */
        .wrapper {
            position: relative;
            width: 350px; height: 600px; /* Ukuran Portrait HP Mewah */
            border-radius: 40px;
            box-shadow: 0 25px 50px rgba(139, 94, 131, 0.1);
            overflow: hidden;
            /* Efek Masuk: Fade-in & Zoom-in (GSAP) */
            opacity: 0; transform: scale(0.9);
        }

        /* --- LAYER 1: DEKORASI BUNGA MENJUNTAI (Paling Depan) --- */
        .bunga {
            position: absolute; width: 180px; z-index: 50;
            pointer-events: none; opacity: 0;
            /* Animasi: Sway (Sesuai Prompt) */
            transform-origin: top;
            animation: sway 6s ease-in-out infinite;
        }
        .bunga-kiri { top: -20px; left: -30px; }
        .bunga-kanan { top: -20px; right: -30px; transform: scaleX(-1); /* Mirror */ }

        /* --- LAYER 2: AI GENERATED IMAGE (Background Pelaminan) --- */
        .ai-frame {
            position: absolute; inset: 0;
            background-image: url('img/pelaminan-syari.png'); 
            background-size: cover; background-position: center;
            z-index: 10;
            /* Efek: Soft Lighting (Hangat, Sakral) */
            filter: sepia(20%) saturate(110%) brightness(105%);
        }

        /* --- LAYER 3: PENGANTIN (Subtle Zoom-out/Parallax) --- */
        .couple-layer {
            position: absolute; inset: 0;
            background-image: url('img/pengantin-syari.png');
            background-size: contain; background-repeat: no-repeat; background-position: bottom center;
            z-index: 20;
            /* Pergerakan Halus: Subtle Zoom (Sesuai Prompt) */
            transform: scale(1.05);
        }

        /* --- LAYER 4: SPARKLE EFFECT (Di Belakang Glass Layer) --- */
        #sparkle-canvas { position: absolute; inset: 0; z-index: 5; pointer-events: none; }

        /* --- LAYER 5: GLASS OVERLAY & CONTENT --- */
        .glass-overlay {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 40%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px); border-radius: 0 0 40px 40px;
            z-index: 30;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; padding: 20px; border-top: 1px solid rgba(255,255,255,0.2);
        }

        /* Teks: Kaligrafi & Serif Modern (Sesuai Prompt) */
        .sub-title { font-size: 0.7rem; letter-spacing: 4px; text-transform: uppercase; color: #8b5e83; font-weight: 300; }
        .couple-name { font-family: 'Great Vibes', cursive; font-size: 3rem; color: #ad1457; margin: 10px 0; }
        .date-main { font-size: 0.9rem; font-weight: 600; color: #ad1457; letter-spacing: 1px; }

        .btn-buka {
            margin-top: 25px; padding: 12px 40px;
            background: linear-gradient(45deg, #ad1457, #ec407a);
            color: white; border: none; border-radius: 50px; 
            font-weight: 600; cursor: pointer; text-transform: uppercase;
            box-shadow: 0 10px 20px rgba(236, 64, 122, 0.3);
            transition: 0.3s;
        }
        .btn-buka:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(236, 64, 122, 0.4); }

        /* Keyframes */
        @keyframes sway {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(3deg); }
        }
    </style>
</head>
<body>

    <canvas id="sparkle-canvas"></canvas>

    <div class="wrapper" id="cover">
        <img src="img/bunga-kiri.png" class="bunga bunga-kiri" id="fl-left">
        <img src="img/bunga-kanan.png" class="bunga bunga-kanan" id="fl-right">

        <div class="ai-frame" id="frame-bg"></div>

        <div class="couple-layer" id="couple"></div>

        <div class="glass-overlay">
            <p class="sub-title">Undangan Pernikahan</p>
            <h1 class="couple-name">Samira & Murad</h1>
            <p class="date-main">Sabtu, 14 Februari 2026</p>
            <button class="btn-buka" onclick="startExperience()">BUKA UNDANGAN</button>
        </div>
    </div>

    <script>
        // --- LOGIKA ANIMASI GSAP (Sesuai Prompt) ---
        window.onload = () => {
            const tl = gsap.timeline();

            // 1. Frame muncul dengan efek fade-in & sedikit zoom-in
            tl.to("#cover", { opacity: 1, scale: 1, duration: 1.5, ease: "power4.out" })
            
            // 2. Bunga muncul
              .to(".bunga", { opacity: 1, duration: 1, stagger: 0.3 }, "-=0.5")
              
            // 3. Visual pengantin memiliki efek pergerakan halus (Subtle Zoom)
              .to("#frame-bg", { scale: 1.1, duration: 10, ease: "linear", repeat: -1, yoyo: true }, 0)
              .to("#couple", { scale: 1.1, y: -10, duration: 8, ease: "sine.inOut", repeat: -1, yoyo: true }, 0);
        };

        // --- LOGIKA SPARKLE (Canvas-based) ---
        const canvas = document.getElementById('sparkle-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const particles = [];
        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 3 + 1;
                this.speedY = Math.random() * 1 + 0.5;
                this.opacity = Math.random() * 0.5 + 0.1;
            }
            update() {
                this.y -= this.speedY;
                if (this.y < 0) this.y = canvas.height;
            }
            draw() {
                ctx.globalAlpha = this.opacity;
                ctx.fillStyle = '#d4af37'; // Emas
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.random() * Math.PI * 2);
                ctx.fill();
            }
        }
        function init() { for (let i = 0; i < 50; i++) { particles.push(new Particle()); } }
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }
        init(); animate();

        // --- NAVIGASI ---
        function startExperience() {
            gsap.to("body", { opacity: 0, duration: 0.8, onComplete: () => {
                window.location.href = "profil.html"; 
            }});
        }
    </script>
</body>
</html>
