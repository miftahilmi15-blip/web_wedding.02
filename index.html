<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Pop-Out Wedding - Samira & Murad</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    
    <style>
        /* --- CSS Reset & Base --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #1a1a1a; 
            font-family: 'Montserrat', sans-serif; 
            height: 100vh; width: 100vw; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
            /* MEMBERI PERSPEKTIF 3D KE BODY */
            perspective: 1000px;
        }

        /* --- CONTAINER UTAMA (EFEK LAYER 3D) --- */
        .wrapper {
            position: relative;
            width: 320px; height: 550px; /* Ukuran Portrait HP */
            border-radius: 40px;
            overflow: hidden;
            /* Memberi kesan ruang 3D di dalam wrapper */
            transform-style: preserve-3d;
            box-shadow: 0 40px 100px rgba(0,0,0,0.5);
            background: #fff;
        }

        /* --- KONFIGURASI UMUM UNTUK SEMUA LAYER --- */
        .layer {
            position: absolute; inset: 0;
            background-size: cover; background-position: center;
            background-repeat: no-repeat;
            pointer-events: none; /* Supaya tetap bisa klik tombol */
        }

        /* --- 1. LAYER BACKGROUND (Paling Belakang - translateZ Terkecil) --- */
        .layer-bg {
            background-image: url('img/background-pelaminan.png');
            z-index: 10;
            /* translateZ negatif = menjauh dari layar */
            transform: translateZ(-200px); 
            filter: blur(2px) brightness(0.9);
        }

        /* --- 2. LAYER MEMPELAI (Tengah - translateZ Sedang) --- */
        .layer-couple {
            background-image: url('img/mempelai-syari.png');
            z-index: 20;
            /* translateZ mendekati layar */
            transform: translateZ(50px) scale(1.1); 
        }

        /* --- 3. LAYER BUNGA DEPAN (Paling Depan - translateZ Terbesar & Timbul) --- */
        .layer-flower {
            background-image: url('img/bunga-atas.png');
            z-index: 30;
            /* translateZ positif = mendekat ke layar (Timbul!) */
            transform: translateZ(250px) scale(1.3);
            filter: drop-shadow(0 20px 30px rgba(0,0,0,0.3));
            animation: sway 6s ease-in-out infinite;
        }

        /* --- 4. GLASS OVERLAY LAYER (Konten Teks - translateZ Terbesar Kedua) --- */
        .glass-overlay {
            position: absolute; bottom: 0; width: 100%; height: 35%;
            z-index: 40; /* Paling depan */
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 0 0 40px 40px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            padding: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        /* --- Teks Elemen --- */
        .couple-name {
            font-family: 'Great Vibes', cursive; color: #ad1457;
            font-size: 2.8rem; text-shadow: 0 2px 10px rgba(173,20,87,0.1);
            margin-bottom: 20px;
        }

        .btn-buka {
            padding: 12px 40px; background: linear-gradient(45deg, #ad1457, #ec407a);
            color: white; border: none; border-radius: 50px; 
            font-weight: 700; cursor: pointer; text-transform: uppercase;
            box-spacing: 1px; font-size: 0.8rem;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(236, 64, 122, 0.3);
        }
        .btn-buka:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(236, 64, 122, 0.4); }

        /* Animation Keyframes */
        @keyframes sway {
            0%, 100% { transform: translateZ(250px) scale(1.3) rotate(0deg); }
            50% { transform: translateZ(250px) scale(1.3) rotate(2deg); }
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="layer layer-bg"></div>
        <div class="layer layer-couple"></div>
        <div class="layer layer-flower"></div>

        <div class="glass-overlay">
            <h1 class="couple-name">Samira & Murad</h1>
            <button class="btn-buka" onclick="start()">BUKA UNDANGAN</button>
        </div>
    </div>

    <script>
        const wrapper = document.querySelector('.wrapper');
        const bg = document.querySelector('.layer-bg');
        const couple = document.querySelector('.layer-couple');
        const flower = document.querySelector('.layer-flower');

        // --- PART 1: RESPONSIVE INTERACTION ---
        // Menangkap gerakan mouse/jari untuk efek parallax
        wrapper.addEventListener('mousemove', (e) => {
            const rect = wrapper.getBoundingClientRect();
            // Menghitung posisi kursor relatif terhadap pusat wrapper
            const x = (e.clientX - rect.left - rect.width/2) / rect.width;
            const y = (e.clientY - rect.top - rect.height/2) / rect.height;
            
            // Panggil fungsi parallax
            parallax(x, y);
        });

        wrapper.addEventListener('touchstart', (e) => {
            const rect = wrapper.getBoundingClientRect();
            const x = (e.touches[0].clientX - rect.left - rect.width/2) / rect.width;
            const y = (e.touches[0].clientY - rect.top - rect.height/2) / rect.height;
            parallax(x, y);
        });

        // --- PART 2: LOGIKA PARALLAX (WOW EFFECT) ---
        function parallax(x, y) {
            // Kita pakai GSAP agar transisinya sangat smooth & responsif

            // 1. Layer Flower (Paling depan, bergerak PALING BANYAK)
            gsap.to(flower, { 
                x: x * 40, // Faktor pergerakan besar
                y: y * 40,
                duration: 0.5, ease: "power2.out" 
            });

            // 2. Layer Couple (Tengah, bergerak SEDIKIT)
            gsap.to(couple, { 
                x: x * 15, // Faktor pergerakan sedang
                y: y * 15,
                duration: 0.5, ease: "power2.out" 
            });

            // 3. Layer Background (Paling belakang, bergerak PALING SEDIKIT)
            gsap.to(bg, { 
                x: x * 5, // Faktor pergerakan kecil
                y: y * 5,
                duration: 0.5, ease: "power2.out" 
            });
        }

        // --- NAVIGASI ---
        function start() {
            gsap.to(".wrapper", { opacity: 0, scale: 0.8, duration: 0.8 });
            setTimeout(() => { window.location.href = "profil.html"; }, 800);
        }
    </script>
</body>
</html>
