<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wedding Invitation | Samira & Murad</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#000; overflow:hidden; font-family:'Montserrat', sans-serif; color:white; }

        /* VIDEO BACKGROUND - FULL SCREEN */
        .video-bg {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover; /* Biar video nutup layar tanpa gepeng */
            z-index: 1;
        }

        /* DARK OVERLAY BIAR TEKS KELIATAN */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.3);
            z-index: 2;
        }

        /* UI OVERLAY */
        .ui-content {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 40%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            z-index: 3;
        }

        .title { font-family:'Great Vibes', cursive; font-size:3rem; color:#ec407a; margin-bottom:10px; }
        .date-text { font-size:0.9rem; margin-bottom:20px; letter-spacing: 2px; }

        .btn {
            padding:15px 40px; border:none; border-radius:50px;
            background:linear-gradient(45deg,#ad1457,#ec407a);
            color:white; cursor:pointer; letter-spacing:2px;
            transition:0.3s; text-transform: uppercase; font-weight: 600;
        }
        .btn:hover { transform:scale(1.05); filter:brightness(1.2); }
    </style>
</head>
<body>

    <video class="video-bg" autoplay muted loop playsinline poster="gambar-thumbnail.jpg">
        <source src="mempelai.mp4" type="video/mp4">
        Browser Bos tidak mendukung video.
    </video>

    <div class="overlay"></div>

    <div class="ui-content">
        <h1 class="title">Samira & Murad</h1>
        <p class="date-text">Sabtu, 14 Februari 2026</p>
        <button class="btn" onclick="buka()">BUKA UNDANGAN</button>
    </div>

    <script>
        function buka(){
            // Efek transisi halus ke profil.html
            document.body.style.opacity = "0";
            document.body.style.transition = "0.8s";
            setTimeout(() => { window.location.href = "profil.html"; }, 800);
        }
    </script>
</body>
</html>
