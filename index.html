<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samira & Murad | Wedding</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a1a; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }

        .wrapper {
            position: relative;
            width: 350px; height: 600px;
            border-radius: 40px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        /* Semua layer pakai gambar yang sama */
        .layer {
            position: absolute; inset: 0;
            background-image: url('pelaminan-syari.png');
            background-size: cover;
            background-position: center;
        }

        /* 1. LAYER BACKGROUND (Blur) */
        .bg-blur { filter: blur(10px) brightness(0.6); z-index: 1; }

        /* 2. LAYER MAIN (Gambar Asli) */
        .main-img { z-index: 2; }

        /* 3. LAYER BUNGA (Potong bagian atas saja) */
        .bunga-depan {
            z-index: 3;
            /* Memotong gambar: hanya menyisakan bagian atas (bunga) */
            clip-path: inset(0% 0% 85% 0%);
            animation: float 4s ease-in-out infinite;
        }

        /* Glass Overlay */
        .glass-overlay {
            position: absolute; bottom: 0; width: 100%; height: 35%;
            z-index: 4;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            color: white; text-align: center;
        }

        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-10px); } }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="layer bg-blur"></div>
        <div class="layer main-img"></div>
        <div class="layer bunga-depan"></div>

        <div class="glass-overlay">
            <h1 style="font-family: 'Great Vibes'; font-size: 2.5rem;">Samira & Murad</h1>
            <button onclick="window.location.href='profil.html'" 
                    style="padding:10px 30px; border-radius:30px; border:none; cursor:pointer; margin-top:10px;">
                BUKA UNDANGAN
            </button>
        </div>
    </div>

</body>
</html>
