<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wedding Invitation | Samira & Murad</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#000; display:flex; justify-content:center; align-items:center; height:100vh; overflow:hidden; }

        .wrapper {
            position:relative;
            width:320px; height:550px;
            border-radius:40px; overflow:hidden;
            box-shadow:0 20px 50px rgba(0,0,0,0.5);
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1); /* Transisi klik halus */
        }

        .main-img {
            position:absolute; width:100%; height:100%;
            background:url('pelaminan-syari.png') center/cover no-repeat;
            animation: zoomMove 18s ease-in-out infinite alternate;
            z-index:1;
        }

        @keyframes zoomMove {
            0% { transform: scale(1) translateY(0); }
            100% { transform: scale(1.25) translateY(-5%); }
        }

        .glow {
            position:absolute; width:100%; height:100%;
            background: radial-gradient(circle at center, rgba(255,255,255,0.2), transparent 70%);
            z-index:2;
        }

        .sparkle {
            position:absolute; width:100%; height:100%;
            background: radial-gradient(circle, rgba(255,255,255,0.3) 1px, transparent 1px);
            background-size:30px 30px;
            animation: sparkleMove 10s linear infinite;
            mix-blend-mode: screen; /* Biar lebih natural */
            z-index:3;
        }

        @keyframes sparkleMove { from { transform: translateY(0); } to { transform: translateY(-30px); } }

        .glass-overlay {
            position:absolute; bottom:0; width:100%; height:30%;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
            display:flex; flex-direction:column;
            justify-content:center; align-items:center;
            color:white; z-index:5;
        }

        .title { font-family:'Great Vibes', cursive; font-size:2.5rem; letter-spacing:1px; margin-bottom:10px; }
        
        .btn {
            padding:12px 35px; border-radius:30px; border:none; cursor:pointer;
            background:white; color:#ad1457; font-weight:bold;
            transition:0.3s; text-transform: uppercase; font-size: 0.7rem; letter-spacing: 2px;
        }
        .btn:hover { transform:scale(1.05); background:#f0f0f0; }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="main-img"></div>
        <div class="glow"></div>
        <div class="sparkle"></div>
        <div class="glass-overlay">
            <div class="title">Samira & Murad</div>
            <button class="btn" onclick="buka()">BUKA UNDANGAN</button>
        </div>
    </div>

    <script>
        function buka(){
            // Efek transisi saat tombol diklik
            const wrap = document.querySelector(".wrapper");
            wrap.style.transform = "scale(0.9)";
            wrap.style.opacity = "0";
            setTimeout(() => { window.location.href = "profil.html"; }, 800);
        }
    </script>
</body>
</html>
