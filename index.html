<!DOCTYPE html>
<html lang="id">
<head>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; }

        .wrapper {
            position: relative;
            width: 320px; height: 550px;
            border-radius: 40px; overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        /* Ini kunci efek "Masuk ke dalam": Zoom & Focal Point */
        .zoom-in-effect {
            width: 100%; height: 100%;
            background: url('pelaminan-syari.png') center/cover no-repeat;
            
            /* Animasi Zoom Masuk Perlahan */
            animation: dollyZoom 15s ease-in-out infinite alternate;
        }

        @keyframes dollyZoom {
            0% { transform: scale(1) translateY(0); }
            100% { transform: scale(1.3) translateY(-5%); } /* Zoom 30% dan fokus ke atas */
        }

        /* Overlay Glassmorphism biar tetep elegan */
        .glass-overlay {
            position: absolute; bottom: 0; width: 100%; height: 30%;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            color: white; text-align: center;
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="zoom-in-effect"></div>
        
        <div class="glass-overlay">
            <h1 style="font-family: 'Great Vibes'; font-size: 2.5rem;">Samira & Murad</h1>
            <button onclick="window.location.href='profil.html'" 
                    style="padding:10px 30px; border-radius:30px; border:none; cursor:pointer; background:white; color:#ad1457; font-weight:bold;">
                BUKA UNDANGAN
            </button>
        </div>
    </div>
</body>
</html>
